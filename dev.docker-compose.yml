version: '3'

services:

  astro-auto-body-shop:
    build:
      context: .
      dockerfile: ${ASTRO_AUTO_BODE_SHOP_DOCKERFILE}
      args:
        PROJECT_DIR: src/auto-body-shop
    container_name: auto-body-shop-${MODE}
    volumes:
      - ./src/auto-body-shop:/app
      - /app/node_modules
    ports:
      - "4323:4323"

  astro-olena-vlasiuk:
    build:
      context: .
      dockerfile: ${ASTRO_OLENA_VLASIUK_DOCKERFILE}
      args:
        PROJECT_DIR: src/olena-vlasiuk-me
    container_name: astro-olena-vlasiuk-${MODE}
    volumes:
      - ./src/olena-vlasiuk-me:/app
      - /app/node_modules
    ports:
      - "4322:4322"

  astro-builder-tsb-enterprise:
    build:
      context: .
      dockerfile: ${ASTRO_DOCKERFILE}
      args:
        PROJECT_DIR: src/tsb-enterprise
    container_name: astro-tsb-${MODE}
    volumes:
      - ./src/tsb-enterprise:/app
      - /app/node_modules
    ports:
      - "4321:4321"

  all-lendings:
    image: nginx:alpine
    container_name: all-lendings-combined
    ports:
      - "8091:8091"
      - "8092:8092"
      - "8093:8093"
      - "8094:8094"
      - "8095:8095"
      - "8096:8096"
      - "8097:8097"
    volumes:
      - ${NGINX_CONF}:/etc/nginx/conf.d/default.conf:ro

      - ./src/owl-solution:/usr/share/nginx/html/owl-solution:ro
      - ./src/dynamic-ui-bridge:/usr/share/nginx/html/dynamic-ui-bridge:ro
      - ./src/real-time-speech-translator:/usr/share/nginx/html/real-time-speech-translator:ro
      - ./src/vlasiuk-me:/usr/share/nginx/html/vlasiuk-me:ro
      - ./src/tsb-enterprise/dist:/usr/share/nginx/html/tsb-enterprise:ro
      - ./src/olena-vlasiuk-me/dist:/usr/share/nginx/html/olena-vlasiuk-me:ro
      - ./src/auto-body-shop/dist:/usr/share/nginx/html/auto-body-shop:ro
    depends_on:
      - astro-builder-tsb-enterprise
      - astro-olena-vlasiuk
      - astro-auto-body-shop