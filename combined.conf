server {
    listen 8091;
    location / { root /usr/share/nginx/html/owl-solution; index index.html; }
}

server {
    listen 8092;
    location / { root /usr/share/nginx/html/dynamic-ui-bridge; index index.html; }
}

server {
    listen 8093;
    location / { root /usr/share/nginx/html/real-time-speech-translator; index index.html; }
}

server {
    listen 8094;
    location / { root /usr/share/nginx/html/vlasiuk-me; index index.html; }
}

server {
    listen 8095;
    location / {
        root /usr/share/nginx/html/tsb-enterprise;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 8096;
    location / {
        root /usr/share/nginx/html/olena-vlasiuk-me;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 8097;

    gzip on;
    gzip_static on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_http_version 1.0;


    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location /_astro/ {
        root /usr/share/nginx/html/auto-body-shop;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|woff2?)$ {
        root /usr/share/nginx/html/auto-body-shop;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        root /usr/share/nginx/html/auto-body-shop;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}